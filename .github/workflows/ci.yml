name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          Set-Location launcher
          if (Test-Path package-lock.json) {
            npm ci
          } else {
            npm install
          }

      - name: Build frontend
        shell: pwsh
        run: |
          Set-Location launcher
          npm run build

      - name: Cargo check (Tauri backend)
        shell: pwsh
        run: |
          Set-Location launcher/src-tauri
          cargo check
